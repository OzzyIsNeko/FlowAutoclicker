<svg xmlns="http://www.w3.org/2000/svg" width="1066" height="674" viewBox="0 0 1066 674" role="img" aria-label="Flow Autoclicker example UI">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#13192a"/>
      <stop offset="100%" stop-color="#0f1422"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1b2236"/>
      <stop offset="100%" stop-color="#162138"/>
    </linearGradient>
    <linearGradient id="panel2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#244566"/>
      <stop offset="100%" stop-color="#1f3b58"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#000" flood-opacity="0.28"/>
    </filter>
    <style>
      .title { font: 700 36px "Trebuchet MS", "Segoe UI", sans-serif; fill: #eef4ff; }
      .subtitle { font: 700 18px "Trebuchet MS", "Segoe UI", sans-serif; fill: #86a0c8; }
      .panelTitle { font: 700 21px "Trebuchet MS", "Segoe UI", sans-serif; fill: #eef4ff; }
      .small { font: 600 13px "Trebuchet MS", "Segoe UI", sans-serif; fill: #8fa2c3; }
      .label { font: 600 12px "Trebuchet MS", "Segoe UI", sans-serif; fill: #b8c7e3; }
      .value { font: 700 28px "Trebuchet MS", "Segoe UI", sans-serif; fill: #f1f6ff; }
      .buttonText { font: 700 15px "Trebuchet MS", "Segoe UI", sans-serif; fill: #f7fbff; }
      .bigButtonText { font: 700 17px "Trebuchet MS", "Segoe UI", sans-serif; fill: #f7fbff; }
    </style>
  </defs>

  <rect width="1066" height="674" fill="url(#bg)"/>
  <circle cx="60" cy="20" r="110" fill="#1b2c43" opacity="0.9"/>
  <circle cx="978" cy="15" r="105" fill="#1b2c43" opacity="0.9"/>

  <rect x="0" y="0" width="1066" height="31" fill="#1d1d1f"/>
  <circle cx="18" cy="16" r="4" fill="#d7e4ff"/>
  <text x="30" y="19" font-family="Segoe UI, sans-serif" font-size="12" fill="#f0f4ff">Flow Autoclicker</text>

  <text x="26" y="93" class="title">Flow Autoclicker</text>
  <text x="29" y="125" class="subtitle">best autoclicker</text>

  <g filter="url(#shadow)">
    <rect x="785" y="58" rx="22" ry="22" width="130" height="44" fill="#37c4f3"/>
    <rect x="925" y="58" rx="22" ry="22" width="126" height="44" fill="#37c4f3"/>
    <text x="850" y="86" text-anchor="middle" class="buttonText">Dark Mode</text>
    <text x="988" y="86" text-anchor="middle" class="buttonText">Sounds On</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="24" y="150" width="321" height="528" rx="18" fill="url(#panel)" stroke="#5178b8" stroke-width="1.2"/>
    <rect x="361" y="150" width="304" height="528" rx="18" fill="url(#panel)" stroke="#5178b8" stroke-width="1.2"/>
    <rect x="679" y="150" width="362" height="528" rx="18" fill="url(#panel2)" stroke="#33b9ea" stroke-width="1.2"/>
  </g>

  <text x="47" y="192" class="panelTitle">Speed</text>
  <text x="46" y="215" class="small">set up speed, jitter, and burst</text>

  <g>
    <rect x="45" y="246" width="132" height="90" rx="16" fill="#121a31" stroke="#4c79b5" stroke-width="1"/>
    <rect x="191" y="246" width="132" height="90" rx="16" fill="#121a31" stroke="#4c79b5" stroke-width="1"/>
    <rect x="45" y="349" width="132" height="90" rx="16" fill="#121a31" stroke="#4c79b5" stroke-width="1"/>
    <rect x="191" y="349" width="132" height="90" rx="16" fill="#121a31" stroke="#4c79b5" stroke-width="1"/>
    <text x="60" y="273" class="label">Interval (ms)</text>
    <text x="206" y="273" class="label">Jitter (%)</text>
    <text x="60" y="376" class="label">Burst</text>
    <text x="206" y="376" class="label">Limit</text>
    <rect x="54" y="281" width="114" height="33" fill="#0f1730"/>
    <rect x="200" y="281" width="114" height="33" fill="#0f1730"/>
    <rect x="54" y="384" width="114" height="33" fill="#0f1730"/>
    <rect x="200" y="384" width="114" height="33" fill="#0f1730"/>
    <text x="111" y="307" text-anchor="middle" class="value" font-size="24">1</text>
    <text x="257" y="307" text-anchor="middle" class="value" font-size="24">0</text>
    <text x="111" y="410" text-anchor="middle" class="value" font-size="24">1</text>
    <text x="257" y="410" text-anchor="middle" class="value" font-size="24">0</text>
  </g>

  <text x="47" y="475" class="small">Estimated speed</text>
  <text x="47" y="504" class="value" font-size="20">1000 cps</text>
  <rect x="46" y="601" width="273" height="49" rx="22" fill="#171f33" stroke="#4c79b5" stroke-width="1"/>
  <text x="182" y="632" text-anchor="middle" class="buttonText">Jitter Off</text>

  <text x="384" y="192" class="panelTitle">Controls</text>
  <text x="382" y="215" class="small">choose hotkeys and control stuff</text>
  <text x="383" y="256" class="label">Mouse button</text>
  <g>
    <rect x="376" y="255" width="78" height="48" rx="22" fill="#37c4f3"/>
    <rect x="460" y="255" width="78" height="48" rx="22" fill="#171f33" stroke="#4c79b5" stroke-width="1"/>
    <rect x="544" y="255" width="78" height="48" rx="22" fill="#171f33" stroke="#4c79b5" stroke-width="1"/>
    <text x="415" y="285" text-anchor="middle" class="buttonText">Left</text>
    <text x="499" y="285" text-anchor="middle" class="buttonText">Right</text>
    <text x="583" y="285" text-anchor="middle" class="buttonText">Middle</text>
  </g>
  <text x="383" y="342" class="label">Click target</text>
  <g>
    <rect x="376" y="373" width="119" height="48" rx="22" fill="#37c4f3"/>
    <rect x="502" y="373" width="133" height="48" rx="22" fill="#171f33" stroke="#4c79b5" stroke-width="1"/>
    <text x="436" y="403" text-anchor="middle" class="buttonText">Follow cursor</text>
    <text x="569" y="403" text-anchor="middle" class="buttonText">Use lock point</text>
  </g>
  <rect x="376" y="484" width="259" height="48" rx="22" fill="#37c4f3"/>
  <text x="506" y="514" text-anchor="middle" class="buttonText">Move Lock Point  847, 620</text>
  <rect x="376" y="555" width="259" height="48" rx="22" fill="#171f33" stroke="#4c79b5" stroke-width="1"/>
  <text x="506" y="585" text-anchor="middle" class="buttonText">Soft Start Off</text>
  <rect x="376" y="624" width="259" height="48" rx="22" fill="#37c4f3"/>
  <text x="506" y="654" text-anchor="middle" class="buttonText">Hotkey  F6</text>

  <text x="702" y="192" class="panelTitle">Idle</text>
  <text x="701" y="223" class="small">glorified stopwatch lol</text>
  <text x="716" y="301" class="value" font-size="44">0</text>
  <text x="717" y="335" class="small" font-size="14">Clicks sent</text>
  <text x="716" y="384" class="value" font-size="24">0.0 cps</text>
  <text x="717" y="409" class="small">Timing drift  0 us</text>
  <text x="703" y="463" class="label">Target: cursor</text>
  <rect x="702" y="509" width="311" height="46" rx="22" fill="#37c4f3"/>
  <text x="858" y="539" text-anchor="middle" class="buttonText">Autoclicker ready</text>
  <rect x="702" y="569" width="311" height="75" rx="34" fill="#37c4f3"/>
  <text x="858" y="616" text-anchor="middle" class="bigButtonText">Start Engine</text>
</svg>
